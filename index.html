<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
        
            background-size: cover;
            background-position: center;
            animation: slide 12s ease-in-out infinite;
        
            filter: blur(6px) brightness(1);
            transform: scale(1.1) rotate(-2deg);
        }
        
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(10, 25, 50, 0.5);
            z-index: -1;
        }
        
        @keyframes slide {
        
            0% {
                background-image: url("https://i.pinimg.com/1200x/d3/87/a2/d387a25cfcadea95e4ce5c78ac682119.jpg");
                filter: blur(6px) brightness(1);
                transform: scale(1.1) rotate(-2deg);
            }
        
            40% {
                background-image: url("https://i.pinimg.com/1200x/07/d8/0e/07d80e23bb62a11c678493c484b6d148.jpg");
                filter: blur(8px) brightness(1.3);
                transform: scale(1.2) rotate(3deg);
            }
        
            80% {
                background-image: url("https://i.pinimg.com/1200x/97/4d/cf/974dcf4589bd4648d8cca04be51cc78d.jpg");
                filter: blur(7px) brightness(1.2);
                transform: scale(1.15) rotate(-3deg);
            }
        
            100% {
                background-image: url("https://i.pinimg.com/1200x/c8/a8/ed/c8a8ed8b3f0ab970a8db5f2f56b6c9e1.jpg");
                filter: blur(6px) brightness(1);
                transform: scale(1.1) rotate(0deg);
            }
        }
    </style>
</head>

<body>
    
</body>
</html>
