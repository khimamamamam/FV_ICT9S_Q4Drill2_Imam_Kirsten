<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
        
            background-size: cover;
            background-position: center;
            animation: slide 12s ease-in-out infinite;
        
            filter: blur(6px) brightness(1);
            transform: scale(1.1) rotate(-2deg);
        }
        
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 217, 78, 0.5);
            z-index: -1;
        }
        
        @keyframes slide {
        
            0% {
                background-image: url("https://i.pinimg.com/736x/d7/c6/3a/d7c63a05c3afc61325be53c4be5d728d.jpg");
                filter: blur(6px) brightness(1);
                transform: scale(1.1) rotate(-2deg);
            }
        
            40% {
                background-image: url("https://i.pinimg.com/control1/1200x/64/02/7d/64027daf8b4998a8d4374d577c3bc585.jpg");
                filter: blur(8px) brightness(1.3);
                transform: scale(1.2) rotate(3deg);
            }
        
            80% {
                background-image: url("https://i.pinimg.com/control1/736x/8f/65/63/8f6563a9d339ed641b026cb444d1fe3d.jpg");
                filter: blur(7px) brightness(1.2);
                transform: scale(1.15) rotate(-3deg);
            }
        
            100% {
                background-image: url("https://i.pinimg.com/1200x/f9/6b/cb/f96bcb05e4b84fd5cd189b6cb7995202.jpg");
                filter: blur(6px) brightness(1);
                transform: scale(1.1) rotate(0deg);
            }
        }
    </style>
</head>

<body>
    
</body>
</html>
